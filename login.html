<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MBX Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://samovessoprd.blob.core.windows.net/movesso/dist/components/language-selector/language-selector.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f4f4;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* NAVBAR */

.navbar{
height:70px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
border-bottom:1px solid #ddd;
}

.logo{
font-size:28px;
font-weight:600;
color:#777;
}

.logo span{
font-weight:400;
font-size:16px;
}

.menu{
display:flex;
gap:30px;
font-size:15px;
}

.menu a{
text-decoration:none;
color:#444;
}

.right-area{
display:flex;
align-items:center;
gap:15px;
}

.login-btn{
background:#1f4ed8;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.mbx{
font-size:70px;
font-weight:800;
margin-bottom:20px;
}

/* FORM */

.login-box{
width:380px;
}

label{
font-size:14px;
color:#333;
margin-bottom:6px;
display:block;
}

.input{
position:relative;
margin-bottom:18px;
}

.input input{
width:100%;
padding:14px 45px 14px 14px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

.eye-icon{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
width:22px;
height:22px;
color:#666;
}

/* CHECKBOX */

.remember{
display:flex;
align-items:center;
gap:8px;
margin-bottom:20px;
font-size:14px;
}

/* BUTTON */

.submit{
width:100%;
padding:14px;
background:#222;
border:none;
color:white;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.submit:hover{
background:#000;
}

/* LINK */

.forgot{
text-align:center;
margin-top:20px;
font-size:14px;
color:#444;
cursor:pointer;
}

/* FOOTER */

.footer{
height:60px;
background:#e9e9e9;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
font-size:14px;
color:#333;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">
MBA <span>USP ESALQ</span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Sobre</a>
<a href="#">Parcerias</a>
<a href="#">Serviços</a>
<a href="#">Contato</a>
</div>

<div class="right-area">

<button class="login-btn">Login</button>

<language-selector></language-selector>

</div>

</div>

<div class="main">

<div class="mbx">MBX</div>

<div class="login-box">

<label>E-mail</label>

<div class="input">
<input type="email" id="email" placeholder="E-mail">
</div>

<label>Senha</label>

<div class="input">

<input type="password" id="senha" placeholder="Senha">

<div class="eye-icon" onclick="toggleSenha()">

<svg id="eyeOpen" style="display:none" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M2.458 12C3.732 7.943 7.523 5 12 5
c4.478 0 8.268 2.943 9.542 7
-1.274 4.057-5.064 7-9.542 7
-4.477 0-8.268-2.943-9.542-7z"/>
</svg>

<svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2"/>
</svg>

</div>

</div>

<div class="remember">
<input type="checkbox">
<span>Mantenha-me conectado</span>
</div>

<button class="submit" id="loginBtn">
Iniciar sessão
</button>

<div class="forgot">
Esqueceu sua senha?
</div>

</div>

</div>

<div class="footer">

<div>
Todos os direitos reservados – 2026
</div>

<div>
Desenvolvido por: <b>Pecege</b>
</div>

</div>


<script type="module">

/* ===== FIREBASE ===== */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBL4Hy0VNHm-GJV0ItAwqJUugetksmvujM",
authDomain: "olivieri-site.firebaseapp.com",
projectId: "olivieri-site",
storageBucket: "olivieri-site.firebasestorage.app",
messagingSenderId: "759268911996",
appId: "1:759268911996:web:ff78c89893857423d1d2f9",
measurementId: "G-N09GMDHLCJ"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);

/* ===== LOGIN ===== */

document.getElementById("loginBtn").addEventListener("click", async () => {

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

try{

await signInWithEmailAndPassword(auth, email, senha);

window.location.href = "dashboard.html";

}catch(error){

alert("Erro ao realizar login: " + error.message);

}

});

/* ===== TOGGLE SENHA ===== */

window.toggleSenha = function(){

let campo = document.getElementById("senha");
let eyeOpen = document.getElementById("eyeOpen");
let eyeClosed = document.getElementById("eyeClosed");

if(campo.type === "password"){

campo.type = "text";
eyeOpen.style.display = "block";
eyeClosed.style.display = "none";

}else{

campo.type = "password";
eyeOpen.style.display = "none";
eyeClosed.style.display = "block";

}

}

</script>

</body>
</html>
