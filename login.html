<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MBX Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://samovessoprd.blob.core.windows.net/movesso/dist/components/language-selector/language-selector.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f4f4f4;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* NAVBAR */

.navbar{
height:70px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
border-bottom:1px solid #ddd;
}

.logo{
font-size:28px;
font-weight:600;
color:#777;
}

.logo span{
font-weight:400;
font-size:16px;
}

.menu{
display:flex;
gap:30px;
font-size:15px;
}

.menu a{
text-decoration:none;
color:#444;
}

.right-area{
display:flex;
align-items:center;
gap:15px;
}

.login-btn{
background:#1f4ed8;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

/* LANGUAGE SELECTOR */

.language-selector-container{
position:relative;
display:flex;
flex-direction:column;
align-items:center;
}

.language-trigger{
background:#fff;
border:1px solid #e3e3e3;
border-radius:12px;
padding:14px 18px;
min-width:150px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
}

.optionSelection{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.svgIcon{
display:flex;
align-items:center;
justify-content:center;
width:22px;
height:22px;
}

.svgIcon img{
width:22px;
height:22px;
}

.optionText{
font-size:15px;
font-weight:500;
color:#333;
}

/* MENU */

.language-menu{
position:absolute;
top:60px;
background:#f5f5f5;
border-radius:12px;
border:1px solid #e3e3e3;
width:170px;
padding:8px 0;
display:none;
flex-direction:column;
align-items:center;
}

.language-menu.open{
display:flex;
}

.language-option{
width:100%;
display:flex;
justify-content:center;
padding:12px 0;
cursor:pointer;
}

.language-option:hover{
background:#eaeaea;
}

.language-option.active{
background:#e0e0e0;
}
  
/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.mbx{
font-size:70px;
font-weight:800;
margin-bottom:20px;
}

/* FORM */

.login-box{
width:380px;
}

label{
font-size:14px;
color:#333;
margin-bottom:6px;
display:block;
}

.input{
position:relative;
margin-bottom:18px;
}

.input input{
width:100%;
padding:14px 45px 14px 14px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

.eye-icon{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
width:22px;
height:22px;
color:#666;
}

/* CHECKBOX */

.remember{
display:flex;
align-items:center;
gap:8px;
margin-bottom:20px;
font-size:14px;
}

/* BUTTON */

.submit{
width:100%;
padding:14px;
background:#222;
border:none;
color:white;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.submit:hover{
background:#000;
}

/* LINK */

.forgot{
text-align:center;
margin-top:20px;
font-size:14px;
color:#444;
cursor:pointer;
}

/* FOOTER */

.footer{
height:60px;
background:#e9e9e9;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
font-size:14px;
color:#333;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">
MBA <span>USP ESALQ</span>
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Sobre</a>
<a href="#">Parcerias</a>
<a href="#">Serviços</a>
<a href="#">Contato</a>
</div>

<div class="right-area">

<button class="login-btn">Login</button>

<language-selector></language-selector>

<div class="language-selector-container">

<button class="language-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">

<div class="optionSelection">
<div class="svgIcon">
<img src="https://samovessoprd.blob.core.windows.net/movesso/dist/assets/svg/lang-portuguese-icon.svg" alt="pt">
</div>
<p class="optionText">PT | BR</p>
</div>

</button>

<ul class="language-menu" role="listbox">

<li class="language-option active" data-value="pt" role="option">

<div class="optionSelection">
<div class="svgIcon">
<img src="https://samovessoprd.blob.core.windows.net/movesso/dist/assets/svg/lang-portuguese-icon.svg" alt="pt">
</div>
<p class="optionText">PT | BR</p>
</div>

</li>

<li class="language-option" data-value="en" role="option">

<div class="optionSelection">
<div class="svgIcon">
<img src="https://samovessoprd.blob.core.windows.net/movesso/dist/assets/svg/lang-english-icon.svg" alt="en">
</div>
<p class="optionText">EN | US</p>
</div>

</li>

<li class="language-option" data-value="es" role="option">

<div class="optionSelection">
<div class="svgIcon">
<img src="https://samovessoprd.blob.core.windows.net/movesso/dist/assets/svg/lang-spanish-icon.svg" alt="es">
</div>
<p class="optionText">ES | ES</p>
</div>

</li>

</ul>

</div>

</div>

</div>

<div class="main">

<div class="mbx">MBX</div>

<div class="login-box">

<label>E-mail</label>

<div class="input">
<input type="email" placeholder="E-mail">
</div>

<label>Senha</label>

<div class="input">

<input type="password" id="senha" placeholder="Senha">

<div class="eye-icon" onclick="toggleSenha()">

<svg id="eyeOpen" style="display:none" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M2.458 12C3.732 7.943 7.523 5 12 5
c4.478 0 8.268 2.943 9.542 7
-1.274 4.057-5.064 7-9.542 7
-4.477 0-8.268-2.943-9.542-7z"/>
</svg>

<svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M13.875 18.825A10.05 10.05 0 0112 19
c-4.478 0-8.268-2.943-9.542-7
a9.956 9.956 0 012.042-3.368"/>
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M6.223 6.223A9.956 9.956 0 0112 5
c4.478 0 8.268 2.943 9.542 7
a9.97 9.97 0 01-4.132 5.411"/>
<line x1="3" y1="3" x2="21" y2="21"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"/>
</svg>

</div>

</div>

<div class="remember">
<input type="checkbox">
<span>Mantenha-me conectado</span>
</div>

<button class="submit">
Iniciar sessão
</button>

<div class="forgot">
Esqueceu sua senha?
</div>

</div>

</div>

<div class="footer">

<div>
Todos os direitos reservados – 2026
</div>

<div>
Desenvolvido por: <b>Pecege</b>
</div>

</div>

<script>

function toggleSenha(){

let campo = document.getElementById("senha");
let eyeOpen = document.getElementById("eyeOpen");
let eyeClosed = document.getElementById("eyeClosed");

if(campo.type === "password"){

campo.type = "text";
eyeOpen.style.display = "block";
eyeClosed.style.display = "none";

}else{

campo.type = "password";
eyeOpen.style.display = "none";
eyeClosed.style.display = "block";

}

}

/* MENU IDIOMA */

const trigger = document.querySelector(".language-trigger");
const menu = document.querySelector(".language-menu");

trigger.addEventListener("click", () => {

menu.classList.toggle("open");

});

</script>

</body>
</html>
