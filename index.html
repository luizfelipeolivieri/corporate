<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Olivieri</title>

<style>

body{
margin:0;
background:white;
font-family:Arial, Helvetica, sans-serif;
}

.menu{

position:fixed;
top:0;
width:100%;
height:60px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-sizing:border-box;
border-bottom:1px solid #1f1f1f;

}

.logo{
font-size:18px;
font-weight:500;
}

.login{

border:none;
background:#1a73e8;
color:white;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
}

.container{

margin-top:120px;
text-align:center;

}

.popup{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
justify-content:center;
align-items:center;

}

.box{

background:white;
padding:35px;
width:320px;
border-radius:10px;

}

input{

width:100%;
padding:10px;
margin:8px 0;
box-sizing:border-box;

}

.enter{

background:#1a73e8;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;

}

</style>
</head>

<body>

<div class="menu">

<div class="logo">Olivieri</div>

<button class="login" onclick="openLogin()">Login</button>

</div>


<div class="container">

<h1>Welcome</h1>
<p>Faça login para continuar</p>

</div>


<div id="popup" class="popup">

<div class="box">

<h3>Login</h3>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Senha">

<button class="enter" onclick="login()">Entrar</button>

<br><br>

<button onclick="register()">Criar conta</button>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyBL4Hy0VNHm-GJV0ItAwqJUugetksmvujM",

authDomain: "olivieri-site.firebaseapp.com",

projectId: "olivieri-site",

storageBucket: "olivieri-site.firebasestorage.app",

messagingSenderId: "759268911996",

appId: "1:759268911996:web:ff78c89893857423d1d2f9",

measurementId: "G-N09GMDHLCJ"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



window.openLogin=function(){

document.getElementById("popup").style.display="flex";

}



window.login=function(){

const email=email.value;
const password=password.value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

window.location="olivieri.html";

})

.catch(e=>alert(e.message));

}



window.register=function(){

const email=email.value;
const password=password.value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>alert("Conta criada"))

.catch(e=>alert(e.message));

}

</script>

</body>
</html>
