<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Olivieri</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.logo{
font-size:20px;
font-weight:bold;
}

.login-btn{
background:#3b82f6;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
}

.hero{
text-align:center;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
}

.popup-box{
background:#1e293b;
padding:35px;
border-radius:12px;
width:320px;
position:relative;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.close{
position:absolute;
right:15px;
top:10px;
cursor:pointer;
font-size:18px;
}

.popup input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
}

.popup button{
width:100%;
padding:12px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.error{
color:#f87171;
margin-top:8px;
font-size:14px;
}

</style>
</head>

<body>

<header>

<div class="logo">Olivieri</div>

<button class="login-btn" onclick="openLogin()">Login</button>

</header>

<div class="hero">
<h1>Bem-vindo</h1>
<p>Sistema com Firebase Authentication</p>
</div>

<div class="popup" id="loginPopup">

<div class="popup-box">

<span class="close" onclick="closeLogin()">✕</span>

<h2>Login</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="error" class="error"></p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyBL4Hy0VNHm-GJV0ItAwqJUugetksmvujM",
authDomain: "olivieri-site.firebaseapp.com",
projectId: "olivieri-site",
storageBucket: "olivieri-site.firebasestorage.app",
messagingSenderId: "759268911996",
appId: "1:759268911996:web:ff78c89893857423d1d2f9",
measurementId: "G-N09GMDHLCJ"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.openLogin = () =>{
document.getElementById("loginPopup").style.display="flex";
}

window.closeLogin = () =>{
document.getElementById("loginPopup").style.display="none";
}

window.login = ()=>{

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{
window.location.href="olivieri.html";
})

.catch(()=>{
document.getElementById("error").innerText="Email ou senha inválidos";
})

}

</script>

</body>
</html>
