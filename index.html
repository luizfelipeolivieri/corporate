
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olivieri</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="pwa/manifest.json">
</head>

<body>

<header class="topbar">
<div class="logo">Olivieri</div>

<nav>
<a href="#servicos">Serviços</a>
<a href="#contato">Contato</a>
<button id="langBtn">Idioma ▾</button>
<button id="loginBtn">Login</button>
</nav>
</header>

<section class="hero">
<h1>Construindo soluções digitais modernas</h1>
<p>Plataforma Olivieri</p>
</section>

<section id="servicos" class="section">
<h2>Serviços</h2>
<p>Desenvolvimento web, sistemas e suporte.</p>
</section>

<section id="contato" class="section">
<h2>Contato</h2>
<p>contato@olivieri.com</p>
</section>

<div id="loginModal" class="modal">
<div class="modal-box">
<span id="closeModal">X</span>
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
<script src="js/main.js"></script>

</body>
</html>
