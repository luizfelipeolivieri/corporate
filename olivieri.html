<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Olivieri</title>

<style>

body{
margin:0;
background:white;
font-family:Arial, Helvetica, sans-serif;
}

/* MENU */

.menu{
position:fixed;
top:0;
width:100%;
height:60px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
border-bottom:1px solid #1f1f1f;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
cursor:pointer;
}

/* POPUP GOOGLE STYLE */

.profile-popup{
position:fixed;
top:70px;
right:30px;
width:350px;
background:#f1f3f4;
border-radius:22px;
padding:20px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);

opacity:0;
transform:translateY(-10px);
pointer-events:none;
transition:all .25s ease;
}

.profile-popup.active{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

.email{
text-align:center;
font-size:14px;
margin-bottom:10px;
}

.profile-center{
text-align:center;
}

.profile-center img{
width:80px;
height:80px;
border-radius:50%;
}

.name{
font-size:22px;
margin-top:10px;
}

.edit{
margin-top:8px;
}

.edit input{
padding:6px;
}

.actions{
margin-top:20px;
display:flex;
gap:10px;
}

.actions div{
flex:1;
background:white;
padding:10px;
border-radius:8px;
cursor:pointer;
text-align:center;
}

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
}

.footer a{
text-decoration:none;
color:black;
margin:0 6px;
}

</style>
</head>

<body>

<div class="menu">
<div>Olivieri</div>
<img id="avatar" class="avatar" onclick="toggleProfile()" src="">
</div>

<div id="profilePopup" class="profile-popup">

<div class="email" id="emailText"></div>

<div class="profile-center">

<img id="profilePic">

<div class="name">
<input id="nameInput">
</div>

<input type="file" id="photoInput">

<button onclick="saveProfile()">Salvar</button>

</div>

<div class="actions">
<div onclick="logout()">Sign out</div>
</div>

<div class="footer">
<a href="#">Privacy Policy</a>
•
<a href="#">Terms of Service</a>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";


const firebaseConfig={
apiKey:"AIzaSyBL4Hy0VNHm-GJV0ItAwqJUugetksmvujM",
authDomain:"olivieri-site.firebaseapp.com",
projectId:"olivieri-site",
storageBucket:"olivieri-site.firebasestorage.app",
messagingSenderId:"759268911996",
appId:"1:759268911996:web:ff78c89893857423d1d2f9"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

let currentUser;

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location="index.html";
return;
}

currentUser=user;

const docRef=doc(db,"users",user.uid);
const docSnap=await getDoc(docRef);

const data=docSnap.data();

emailText.innerText=user.email;

nameInput.value=data.name || "";

profilePic.src=data.photo || "https://i.imgur.com/6VBx3io.png";
avatar.src=data.photo || "https://i.imgur.com/6VBx3io.png";

});


window.toggleProfile=function(){

profilePopup.classList.toggle("active");

}


window.saveProfile=async function(){

let photoURL=profilePic.src;

if(photoInput.files[0]){

const file=photoInput.files[0];

const storageRef=ref(storage,"profiles/"+currentUser.uid);

await uploadBytes(storageRef,file);

photoURL=await getDownloadURL(storageRef);

}

await updateDoc(doc(db,"users",currentUser.uid),{

name:nameInput.value,
photo:photoURL

});

alert("Perfil atualizado");

location.reload();

}


window.logout=function(){

signOut(auth).then(()=>{
window.location="index.html";
});

}

</script>
</body>
</html>
