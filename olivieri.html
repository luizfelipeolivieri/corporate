<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Olivieri</title>

<style>

body{

margin:0;
background:white;
font-family:Arial, Helvetica, sans-serif;

}

.menu{

position:fixed;
top:0;
width:100%;
height:60px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-sizing:border-box;
border-bottom:1px solid #1f1f1f;

}

.avatar{

width:36px;
height:36px;
border-radius:50%;
cursor:pointer;

}

.content{

margin-top:120px;
text-align:center;

}



/* POPUP */

.profile-popup{

display:none;
position:fixed;
top:70px;
right:30px;
width:340px;
background:#f1f3f4;
border-radius:20px;
padding:20px;
box-shadow:0 4px 20px rgba(0,0,0,0.25);

}

.profile-popup img{

width:80px;
height:80px;
border-radius:50%;

}

.email{

text-align:center;
font-size:14px;
margin-bottom:10px;

}

.name{

font-size:22px;
margin-top:10px;

}

.btn{

margin-top:20px;
background:white;
border-radius:25px;
padding:10px;
cursor:pointer;
text-align:center;

}

.row{

display:flex;
margin-top:20px;

}

.row div{

flex:1;
background:white;
padding:10px;
text-align:center;
cursor:pointer;

}

.footer{

margin-top:20px;
text-align:center;
font-size:12px;

}

.footer a{

color:black;
text-decoration:none;
margin:0 5px;

}

</style>
</head>

<body>


<div class="menu">

<div>Olivieri</div>

<img id="avatar" class="avatar" onclick="toggleProfile()" src="https://i.imgur.com/6VBx3io.png">

</div>


<div class="content">

<h1>Área Logada</h1>

</div>



<div id="profile" class="profile-popup">

<div class="email" id="userEmail"></div>

<div style="text-align:center">

<img id="profilePic">

<div class="name" id="userName"></div>

</div>

<div class="row">

<div onclick="logout()">Sign out</div>

</div>

<div class="footer">

<a href="#">Privacy Policy</a>
•
<a href="#">Terms of Service</a>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, onAuthStateChanged, signOut }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyBL4Hy0VNHm-GJV0ItAwqJUugetksmvujM",

authDomain: "olivieri-site.firebaseapp.com",

projectId: "olivieri-site",

storageBucket: "olivieri-site.firebasestorage.app",

messagingSenderId: "759268911996",

appId: "1:759268911996:web:ff78c89893857423d1d2f9",

measurementId: "G-N09GMDHLCJ"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);



onAuthStateChanged(auth,user=>{

if(user){

userEmail.innerText=user.email;

userName.innerText="Hi, "+(user.displayName || "User")+"!";

profilePic.src=user.photoURL || "https://i.imgur.com/6VBx3io.png";

avatar.src=user.photoURL || "https://i.imgur.com/6VBx3io.png";

}else{

window.location="index.html";

}

});



window.toggleProfile=function(){

const box=document.getElementById("profile");

box.style.display=box.style.display==="block"?"none":"block";

}



window.logout=function(){

signOut(auth).then(()=>{

window.location="index.html";

});

}

</script>

</body>
</html>
