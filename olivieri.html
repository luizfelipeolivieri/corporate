<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
height:100vh;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.logo{
font-weight:bold;
}

.menu-right{
display:flex;
align-items:center;
gap:15px;
}

.profile{
cursor:pointer;
font-size:22px;
}

.logout{
background:#ef4444;
border:none;
padding:8px 14px;
border-radius:6px;
color:white;
cursor:pointer;
}

.container{
margin-top:120px;
text-align:center;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.6);
}

.popup-box{
background:#1e293b;
padding:35px;
border-radius:12px;
width:320px;
position:relative;
}

.close{
position:absolute;
right:15px;
top:10px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
}

button.save{
width:100%;
padding:12px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<div class="logo">Olivieri</div>

<div class="menu-right">

<div class="profile" onclick="openProfile()">👤</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

</header>

<div class="container">
<h1>Painel do Usuário</h1>
<p>Área logada do sistema</p>
</div>

<div class="popup" id="profilePopup">

<div class="popup-box">

<span class="close" onclick="closeProfile()">✕</span>

<h2>Perfil</h2>

<p>Email</p>
<p id="userEmail"></p>

<p>Nome</p>

<input id="userName">

<button class="save" onclick="saveName()">Salvar</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyBL4Hy0VNHm-GJV0ItAwqJUugetksmvujM",
authDomain: "olivieri-site.firebaseapp.com",
projectId: "olivieri-site",
storageBucket: "olivieri-site.firebasestorage.app",
messagingSenderId: "759268911996",
appId: "1:759268911996:web:ff78c89893857423d1d2f9",
measurementId: "G-N09GMDHLCJ"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

let uid;

window.openProfile = ()=>{
document.getElementById("profilePopup").style.display="flex";
}

window.closeProfile = ()=>{
document.getElementById("profilePopup").style.display="none";
}

window.logout = ()=>{

signOut(auth).then(()=>{
window.location.href="index.html";
})

}

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location.href="index.html";
return;
}

uid = user.uid;

document.getElementById("userEmail").innerText=user.email;

const ref = doc(db,"usuarios",uid);

const snap = await getDoc(ref);

if(snap.exists()){
document.getElementById("userName").value=snap.data().nome;
}

})

window.saveName = async()=>{

const nome=document.getElementById("userName").value;

await setDoc(doc(db,"usuarios",uid),{
nome:nome
});

alert("Nome salvo");

}

</script>

</body>
</html>
