<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área Restrita | Olivieri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root { --primary: #d11313; --primary-hover: #E70909; --black: #000000; }

        body { background-color: #f8f9fa; }

        /* HEADER LOGADO */
        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            background-color: var(--black); color: white;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; z-index: 1000;
        }
        .logo { font-weight: bold; font-size: 1.5rem; text-transform: uppercase; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-details { text-align: right; line-height: 1.2; }
        .user-icon { font-size: 2rem; cursor: pointer; color: var(--primary); transition: 0.3s; }
        .user-icon:hover { color: white; }
        
        .btn-logout {
            background: var(--primary); color: white; border: none;
            padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold;
        }

        /* CONTEÚDO PRINCIPAL */
        main { padding: 120px 5% 50px; min-height: 100vh; }
        .dashboard-card {
            background: white; border-radius: 8px; padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* MODAL DE PERFIL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: white; width: 95%; max-width: 600px; border-radius: 10px;
            padding: 30px; position: relative; max-height: 90vh; overflow-y: auto;
        }
        .close { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; }
        
        .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full-width { grid-column: span 2; }
        
        input { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 5px; outline: none; margin-top: 5px;
        }
        label { font-size: 0.85rem; font-weight: bold; color: #555; }
        
        .btn-save {
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 15px; margin-top: 20px; cursor: pointer; font-size: 1rem; border-radius: 5px;
        }

        footer { background: var(--black); color: white; padding: 20px 5%; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo">OLIVIERI</div>
        <div class="user-info">
            <div class="user-details">
                <p id="display-name">Carregando...</p>
                <small id="display-email">...</small>
            </div>
            <i class="fa-solid fa-circle-user user-icon" onclick="openProfile()"></i>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </div>
    </header>

    <main>
        <div class="dashboard-card">
            <h2>Bem-vindo à sua área exclusiva</h2>
            <hr style="margin: 20px 0; opacity: 0.1;">
            <p>Conteúdo da área logada em desenvolvimento...</p>
        </div>
    </main>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeProfile()">×</span>
            <h3><i class="fa-solid fa-user-gear"></i> Edição de Perfil</h3>
            
            <form id="profile-form">
                <div class="profile-grid">
                    <div class="full-width">
                        <label>E-mail (Não editável)</label>
                        <input type="email" id="u-email" disabled>
                    </div>
                    <div class="full-width">
                        <label>Nome Completo</label>
                        <input type="text" id="u-nome" placeholder="Seu nome">
                    </div>
                    <div>
                        <label>Celular</label>
                        <input type="text" id="u-tel" placeholder="(00) 00000-0000">
                    </div>
                    <div>
                        <label>CEP</label>
                        <input type="text" id="u-cep" placeholder="00000-000" onblur="buscaCep(this.value)">
                    </div>
                    <div class="full-width">
                        <label>Endereço</label>
                        <input type="text" id="u-end" placeholder="Rua, Av...">
                    </div>
                    <div>
                        <label>Número</label>
                        <input type="text" id="u-num">
                    </div>
                    <div>
                        <label>Bairro</label>
                        <input type="text" id="u-bairro">
                    </div>
                    <div>
                        <label>Complemento</label>
                        <input type="text" id="u-comp">
                    </div>
                    <div>
                        <label>Cidade</label>
                        <input type="text" id="u-cidade">
                    </div>
                </div>
                <button type="submit" class="btn-save">Salvar Alterações</button>
            </form>
        </div>
    </div>

    <footer>
        <p>© Olivieri 2026 | Área Restrita Segura</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBL4Hy0VNHm-GJV0ItAwqJUugetksmvujM",
            authDomain: "olivieri-site.firebaseapp.com",
            projectId: "olivieri-site",
            storageBucket: "olivieri-site.firebasestorage.app",
            messagingSenderId: "759268911996",
            appId: "1:759268911996:web:ff78c89893857423d1d2f9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Verificação de Segurança
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('display-email').innerText = user.email;
                document.getElementById('u-email').value = user.email;
                
                // Carregar dados existentes do Firestore
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('display-name').innerText = data.nome || "Usuário";
                    document.getElementById('u-nome').value = data.nome || "";
                    document.getElementById('u-tel').value = data.celular || "";
                    document.getElementById('u-cep').value = data.cep || "";
                    document.getElementById('u-end').value = data.endereco || "";
                    document.getElementById('u-num').value = data.numero || "";
                    document.getElementById('u-bairro').value = data.bairro || "";
                    document.getElementById('u-comp').value = data.complemento || "";
                    document.getElementById('u-cidade').value = data.cidade || "";
                } else {
                    document.getElementById('display-name').innerText = "Novo Membro";
                }
            } else {
                window.location.href = "index.html"; // Redireciona se não houver login
            }
        });

        // Salvar Perfil
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if(!user) return;

            const userData = {
                nome: document.getElementById('u-nome').value,
                celular: document.getElementById('u-tel').value,
                cep: document.getElementById('u-cep').value,
                endereco: document.getElementById('u-end').value,
                numero: document.getElementById('u-num').value,
                bairro: document.getElementById('u-bairro').value,
                complemento: document.getElementById('u-comp').value,
                cidade: document.getElementById('u-cidade').value,
                lastUpdate: new Date()
            };

            try {
                await setDoc(doc(db, "usuarios", user.uid), userData, { merge: true });
                alert("Perfil atualizado com sucesso!");
                closeProfile();
                location.reload();
            } catch (error) {
                alert("Erro ao salvar: " + error.message);
            }
        });

        window.logout = () => signOut(auth);
    </script>

    <script>
        function openProfile() { document.getElementById('profile-modal').style.display = 'flex'; }
        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }

        // API ViaCEP para agilizar o preenchimento
        async function buscaCep(cep) {
            const cleanCep = cep.replace(/\D/g, '');
            if (cleanCep.length === 8) {
                const response = await fetch(`https://viacep.com.br/ws/${cleanCep}/json/`);
                const data = await response.json();
                if (!data.erro) {
                    document.getElementById('u-end').value = data.logradouro;
                    document.getElementById('u-bairro').value = data.bairro;
                    document.getElementById('u-cidade').value = data.localidade;
                }
            }
        }
    </script>
</body>
</html>
