<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Olivieri Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
display:flex;
height:100vh;
background:#f5f6f8;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#fff;
border-right:1px solid #e5e7eb;
padding-top:25px;
}

.logo{
font-size:28px;
font-weight:700;
padding:0 25px 30px 25px;
letter-spacing:2px;
}

.menu{
display:flex;
flex-direction:column;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
padding:12px 25px;
text-decoration:none;
color:#444;
font-size:14px;
border-radius:8px;
margin:3px 10px;
transition:.2s;
}

.menu a:hover{
background:#f2f3f6;
}

.menu svg{
width:18px;
height:18px;
stroke:#555;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
height:70px;
background:#fff;
border-bottom:1px solid #e5e7eb;
display:flex;
align-items:center;
justify-content:flex-end;
padding:0 25px;
gap:20px;
}

.icon{
width:36px;
height:36px;
border-radius:50%;
background:#f1f3f6;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:url("https://i.pravatar.cc/100");
background-size:cover;
}

/* CONTENT */

.content{
padding:30px;
}

.welcome{
font-size:26px;
font-weight:600;
margin-bottom:25px;
}

/* CARDS */

.card{
background:white;
border-radius:14px;
padding:25px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
margin-bottom:25px;
}

/* GRID ROSCAS */

.donut-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.donut-container{
position:relative;
}

.center-value{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:20px;
font-weight:600;
text-align:center;
pointer-events:none;
}

canvas{
max-height:340px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">MBX</div>

<div class="menu">

<a>
<svg fill="none" viewBox="0 0 24 24" stroke-width="2">
<path d="M3 12L12 3l9 9"/>
<path d="M9 21V9h6v12"/>
</svg>
Início
</a>

<a>
<svg fill="none" viewBox="0 0 24 24" stroke-width="2">
<rect x="3" y="4" width="18" height="18" rx="2"/>
</svg>
Calendário
</a>

<a>
<svg fill="none" viewBox="0 0 24 24" stroke-width="2">
<path d="M3 6h18M3 12h18M3 18h18"/>
</svg>
Mercado
</a>

<a>
<svg fill="none" viewBox="0 0 24 24" stroke-width="2">
<path d="M4 5h16v14H4z"/>
</svg>
Meus Cursos
</a>

<a>
<svg fill="none" viewBox="0 0 24 24" stroke-width="2">
<circle cx="12" cy="12" r="9"/>
<path d="M12 6v12"/>
</svg>
Financeiro
</a>

<a>
<svg fill="none" viewBox="0 0 24 24" stroke-width="2">
<path d="M4 19h16V5H4z"/>
</svg>
Biblioteca Digital
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="header">

<div class="icon">

<svg width="18" viewBox="0 0 24 24" fill="none" stroke="black">
<path d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7"/>
</svg>

</div>

<div class="icon">

<svg width="18" viewBox="0 0 24 24" fill="none" stroke="black">
<path d="M21 15a4 4 0 01-4 4H7l-4 4V7a4 4 0 014-4h10a4 4 0 014 4z"/>
</svg>

</div>

<div class="avatar"></div>

</div>

<!-- CONTENT -->

<div class="content">

<div class="welcome">
Olá, Luiz. É bom te ver!
</div>

<!-- AREA CHART -->

<div class="card">

<h3>Receita x Despesas</h3>

<canvas id="areaChart"></canvas>

</div>

<!-- DONUT CHARTS -->

<div class="donut-grid">

<div class="card">

<h3>Gastos do Mês</h3>

<div class="donut-container">

<canvas id="monthDonut"></canvas>

<div id="monthValue" class="center-value"></div>

</div>

</div>

<div class="card">

<h3>Gastos do Ano</h3>

<div class="donut-container">

<canvas id="yearDonut"></canvas>

<div id="yearValue" class="center-value"></div>

</div>

</div>

</div>

</div>

</div>

<script>

/* AREA CHART */

new Chart(document.getElementById("areaChart"),{

type:"line",

data:{
labels:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],

datasets:[

{
label:"Receita",
data:[800,900,850,950,1000,1200,1300,1250,1400,1500,1600,1700],
borderColor:"#2ecc71",
backgroundColor:"rgba(46,204,113,0.2)",
fill:true,
tension:.4
},

{
label:"Despesas",
data:[600,700,650,700,800,900,950,900,1000,1100,1200,1300],
borderColor:"#e74c3c",
backgroundColor:"rgba(231,76,60,0.2)",
fill:true,
tension:.4
}

]

},

options:{
scales:{
y:{
beginAtZero:true,
ticks:{stepSize:100}
}
}
}

});

const categorias=[
"Supermercado",
"Padaria/Restaurante",
"Utilidades",
"Moradia",
"Educação",
"Saúde",
"Transporte",
"Lazer",
"Pessoal",
"Presentes"
];

const colors=[
"#f6d365",
"#fda085",
"#f7797d",
"#c471ed",
"#f093fb",
"#e056fd",
"#74b9ff",
"#55efc4",
"#00cec9",
"#badc58"
];

const valoresMes=[320,120,80,400,150,70,90,60,40,30];
const valoresAno=[22,15,9,25,8,5,7,4,3,2];

/* MONTH DONUT */

new Chart(document.getElementById("monthDonut"),{

type:"doughnut",

data:{
labels:categorias,
datasets:[{
data:valoresMes,
backgroundColor:colors
}]
},

options:{
plugins:{legend:{position:"right"}}
}

});

/* YEAR DONUT */

new Chart(document.getElementById("yearDonut"),{

type:"doughnut",

data:{
labels:categorias,
datasets:[{
data:valoresAno,
backgroundColor:colors
}]
},

options:{
plugins:{legend:{position:"right"}}
}

});

</script>

</body>
</html>
